<!DOCTYPE html>
<html>
<head>
  <title>Mind Map App</title>
  <style>
    body { margin: 0; font-family: Arial; }
    #toolbar {
      padding: 10px;
      background: #eee;
      display: flex;
      gap: 10px;
    }
    #canvas {
      width: 100vw;
      height: 90vh;
      position: relative;
      background: #fafafa;
      overflow: hidden;
    }
    .node {
      position: absolute;
      padding: 10px;
      border-radius: 12px;
      cursor: move;
      min-width: 100px;
      border: 2px solid transparent;
    }
    .selected {
      border: 2px solid #000;
    }
    .controls {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    input { border: none; background: transparent; width: 100%; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode()">Add Node</button>
  <button onclick="groupNodes()">Group</button>
  <button onclick="ungroupNodes()">Ungroup</button>
  <button onclick="deleteSelected()">Delete Selected</button>
  <button onclick="downloadMap()">Download</button>
  <input type="file" onchange="uploadMap(event)">
</div>

<div id="canvas"></div>
<svg id="lines" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>

<script>
let nodes = [];
let edges = [];
let selectedNodes = [];
let id = 0;

const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");

function save() {
  localStorage.setItem("mindmap", JSON.stringify({nodes, edges}));
}

function load() {
  const data = JSON.parse(localStorage.getItem("mindmap"));
  if (data) {
    nodes = data.nodes || [];
    edges = data.edges || [];
    nodes.forEach(createNodeElement);
    drawEdges();
  }
}

function addNode() {
  const node = { id: id++, x: 200, y: 200, text: "Idea", color: "#90cdf4", group: null };
  nodes.push(node);
  createNodeElement(node);
  save();
}

function createNodeElement(node) {
  const div = document.createElement("div");
  div.className = "node";
  div.style.left = node.x + "px";
  div.style.top = node.y + "px";
  div.style.background = node.color;
  div.dataset.id = node.id;

  const input = document.createElement("input");
  input.value = node.text;
  input.oninput = () => { node.text = input.value; save(); };

  // Controls inside node
  const controls = document.createElement("div");
  controls.className = "controls";

  const color = document.createElement("input");
  color.type = "color";
  color.value = node.color;
  color.oninput = () => {
    node.color = color.value;
    div.style.background = node.color;
    save();
  };

  const del = document.createElement("button");
  del.textContent = "X";
  del.onclick = (e) => {
    e.stopPropagation();
    deleteNode(node.id);
  };

  const connect = document.createElement("button");
  connect.textContent = "↔";
  connect.onclick = (e) => {
    e.stopPropagation();
    connectMode(node.id);
  };

  controls.appendChild(color);
  controls.appendChild(connect);
  controls.appendChild(del);

  div.onclick = (e) => {
    e.stopPropagation();
    toggleSelect(node.id, div);
  };

  let offsetX, offsetY;
  div.onmousedown = (e) => {
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    function move(e) {
      const dx = e.clientX - offsetX;
      const dy = e.clientY - offsetY;

      const movingNodes = selectedNodes.includes(node.id)
        ? nodes.filter(n => selectedNodes.includes(n.id))
        : [node];

      movingNodes.forEach(n => {
        n.x += e.movementX;
        n.y += e.movementY;
        const el = document.querySelector(`[data-id='${n.id}']`);
        el.style.left = n.x + "px";
        el.style.top = n.y + "px";
      });

      drawEdges();
    }

    function stop() {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", stop);
      save();
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  };

  div.appendChild(input);
  div.appendChild(controls);
  canvas.appendChild(div);
}

let connectFrom = null;
function connectMode(id) {
  if (!connectFrom) {
    connectFrom = id;
  } else {
    if (connectFrom !== id) {
      edges.push({from: connectFrom, to: id});
      connectFrom = null;
      drawEdges();
      save();
    }
  }
}

function toggleSelect(id, el) {
  if (selectedNodes.includes(id)) {
    selectedNodes = selectedNodes.filter(i => i !== id);
    el.classList.remove("selected");
  } else {
    selectedNodes.push(id);
    el.classList.add("selected");
  }
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  document.querySelector(`[data-id='${id}']`)?.remove();
  drawEdges();
  save();
}

function deleteSelected() {
  selectedNodes.forEach(deleteNode);
  selectedNodes = [];
}

function groupNodes() {
  const groupId = Date.now();
  nodes.forEach(n => {
    if (selectedNodes.includes(n.id)) n.group = groupId;
  });
}

function ungroupNodes() {
  nodes.forEach(n => {
    if (selectedNodes.includes(n.id)) n.group = null;
  });
}

function drawEdges() {
  svg.innerHTML = "";
  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", from.x + 50);
    line.setAttribute("y1", from.y + 30);
    line.setAttribute("x2", to.x + 50);
    line.setAttribute("y2", to.y + 30);
    line.setAttribute("stroke", "black");

    svg.appendChild(line);
  });
}

function downloadMap() {
  const blob = new Blob([JSON.stringify({nodes, edges})], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mindmap.json";
  a.click();
}

function uploadMap(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const data = JSON.parse(reader.result);
    nodes = data.nodes || [];
    edges = data.edges || [];

    canvas.innerHTML = "";
    nodes.forEach(createNodeElement);
    drawEdges();
    save();
  };
  reader.readAsText(file);
}

canvas.onclick = () => {
  selectedNodes = [];
  document.querySelectorAll(".node").forEach(n => n.classList.remove("selected"));
};

load();
</script>

</body>
</html>
