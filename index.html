<!DOCTYPE html>
<html>
<head>
  <title>Mind Map App</title>

  <style>
    body { margin: 0; font-family: Arial; }

    #toolbar {
      padding: 10px;
      background: #eee;
      display: flex;
      gap: 10px;
    }

    #canvas {
      width: 100vw;
      height: 90vh;
      position: relative;
      overflow: hidden;
    }

    .node {
      position: absolute;
      padding: 10px;
      border-radius: 12px;
      cursor: move;
      min-width: 100px;
      border: 2px solid transparent;
    }

    .textNode {
      position: absolute;
      cursor: move;
    }

    .selected {
      border: 2px solid #000;
    }

    #selectionBox {
      position: absolute;
      border: 1px dashed #333;
      background: rgba(0,0,0,0.05);
      display: none;
    }

    textarea {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-family: inherit;
      resize: none;
      overflow: hidden;
      min-height: 20px;
    }

    .controls {
      display: none;
      flex-direction: column;
      gap: 5px;
      margin-top: 5px;
      background: white;
      padding: 5px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: absolute;
      z-index: 10;
    }

    button { cursor: pointer; }
    input { border: none; background: transparent; }
  </style>
</head>

<body>

<div id="toolbar">
  <button onclick="addNode()">Add Node</button>
  <button onclick="addText()">Add Text</button>
  <button onclick="deleteSelected()">Delete</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="undo()">Undo</button>
  <button onclick="redo()">Redo</button>
  <button onclick="downloadMap()">Download</button>

  <input id="filename" placeholder="file name" />
  <input type="file" accept=".json" onchange="loadMap(event)">
</div>

<div id="canvas"></div>
<div id="selectionBox"></div>
<svg id="lines" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>

<script>
let nodes = [];
let edges = [];
let selectedNodes = [];
let history = [];
let future = [];
let id = 0;
let draggingNode = null;
let draggingGroup = null;

const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");
const selectionBox = document.getElementById("selectionBox");

/* ---------------- STATE ---------------- */

function saveState() {
  history.push(JSON.stringify({ nodes, edges }));
  future = [];
}

/* ---------------- LOAD ---------------- */

function loadMap(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const data = JSON.parse(e.target.result);
    nodes = data.nodes || [];
    edges = data.edges || [];
    selectedNodes = [];
    reload();
    saveState();
  };
  reader.readAsText(file);
}

/* ---------------- UNDO/REDO ---------------- */

function undo() {
  if (!history.length) return;
  future.push(JSON.stringify({ nodes, edges }));
  const prev = JSON.parse(history.pop());
  nodes = prev.nodes;
  edges = prev.edges;
  reload();
}

function redo() {
  if (!future.length) return;
  history.push(JSON.stringify({ nodes, edges }));
  const next = JSON.parse(future.pop());
  nodes = next.nodes;
  edges = next.edges;
  reload();
}

/* ---------------- RENDER ---------------- */

function reload() {
  canvas.innerHTML = "";
  nodes.forEach(createElement);
  drawEdges();
}

/* ---------------- ADD ---------------- */

function addNode() {
  const node = {
    id: id++,
    x: 200,
    y: 200,
    text: "Idea",
    color: "#90cdf4",
    textColor: "#000",
    type: "node"
  };
  nodes.push(node);
  createElement(node);
  saveState();
}

function addText() {
  const node = {
    id: id++,
    x: 200,
    y: 200,
    text: "Text",
    color: "#000",
    size: 16,
    type: "text"
  };
  nodes.push(node);
  createElement(node);
  saveState();
}

/* ---------------- CREATE NODE ---------------- */

function createElement(node) {
  const div = document.createElement("div");
  div.className = node.type === "text" ? "textNode" : "node";
  div.style.left = node.x + "px";
  div.style.top = node.y + "px";
  if (node.type === "node") div.style.background = node.color;
  div.dataset.id = node.id;

  const input = document.createElement("textarea");
  input.value = node.text;
  input.style.fontSize = (node.size || 14) + "px";
  input.style.color = node.textColor || "#000";

  input.oninput = () => {
    node.text = input.value;
    saveState();
  };

  /* autosize */
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  /* controls */
  const controls = document.createElement("div");
  controls.className = "controls";

  if (node.type === "node") {
    const color = document.createElement("input");
    color.type = "color";
    color.value = node.color;

    color.oninput = () => {
      node.color = color.value;
      div.style.background = node.color;
      saveState();
    };

    const textColor = document.createElement("input");
    textColor.type = "color";
    textColor.value = node.textColor || "#000";

    textColor.oninput = () => {
      node.textColor = textColor.value;
      input.style.color = node.textColor;
      saveState();
    };

    controls.appendChild(color);
    controls.appendChild(textColor);
  }

  const toggleBtn = document.createElement("button");
  toggleBtn.textContent = "🎨";

  toggleBtn.onclick = (e) => {
    e.stopPropagation();
    controls.style.display =
      controls.style.display === "flex" ? "none" : "flex";
  };

  div.onclick = (e) => {
    e.stopPropagation();
    toggleSelect(node.id, div);
  };

  div.onmousedown = (e) => {
    draggingNode = node;

    function move(e) {
      node.x += e.movementX;
      node.y += e.movementY;
      div.style.left = node.x + "px";
      div.style.top = node.y + "px";
      drawEdges();
    }

    function stop() {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", stop);
      saveState();
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  };

  div.appendChild(input);
  div.appendChild(toggleBtn);
  div.appendChild(controls);
  canvas.appendChild(div);
}

/* ---------------- SELECT ---------------- */

function toggleSelect(id, el) {
  if (selectedNodes.includes(id)) {
    selectedNodes = selectedNodes.filter(i => i !== id);
    el.classList.remove("selected");
  } else {
    selectedNodes.push(id);
    el.classList.add("selected");
  }
}

/* ---------------- EDGES ---------------- */

function drawEdges() {
  svg.innerHTML = "";

  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

    line.setAttribute("x1", from.x + 50);
    line.setAttribute("y1", from.y + 30);
    line.setAttribute("x2", to.x + 50);
    line.setAttribute("y2", to.y + 30);
    line.setAttribute("stroke", "black");
    line.setAttribute("stroke-width", "2");

    svg.appendChild(line);
  });
}

/* ---------------- DELETE ---------------- */

function deleteSelected() {
  nodes = nodes.filter(n => !selectedNodes.includes(n.id));
  edges = edges.filter(e => !selectedNodes.includes(e.from) && !selectedNodes.includes(e.to));
  selectedNodes = [];
  reload();
}

/* ---------------- CLEAR ---------------- */

function clearAll() {
  nodes = [];
  edges = [];
  reload();
}

/* ---------------- DOWNLOAD ---------------- */

function downloadMap() {
  const name = document.getElementById("filename").value || "mindmap";
  const blob = new Blob([JSON.stringify({ nodes, edges })], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".json";
  a.click();
}

/* ---------------- BACKGROUND CLICK ---------------- */

canvas.onclick = () => {
  selectedNodes = [];
  document.querySelectorAll(".node, .textNode").forEach(n => n.classList.remove("selected"));
};

</script>

</body>
</html>
