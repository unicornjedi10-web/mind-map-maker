<!DOCTYPE html>
<html>
<head>
  <title>Mind Map App</title>
  <style>
    body { margin: 0; font-family: Arial; }
    #toolbar { padding: 10px; background: #eee; display: flex; gap: 10px; }
    #canvas { width: 100vw; height: 90vh; position: relative; background: #fafafa; overflow: hidden; }
    .node { position: absolute; padding: 10px; border-radius: 12px; cursor: move; min-width: 100px; border: 2px solid transparent; }
    .selected { border: 2px solid #000; }
    .controls { display: none; flex-direction: column; gap: 5px; margin-top: 5px; }
    .node.active .controls { display: flex; }
    input { border: none; background: transparent; width: 100%; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode()">Add Node</button>
  <button onclick="groupNodes()">Group</button>
  <button onclick="ungroupNodes()">Ungroup</button>
  <button onclick="deleteSelected()">Delete Selected</button>
  <button onclick="downloadMap()">Download</button>
  <input id="filename" placeholder="file name" />
  <input type="file" onchange="uploadMap(event)">
</div>

<div id="canvas"></div>
<svg id="lines" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>

<script>
let nodes = [];
let edges = [];
let selectedNodes = [];
let id = 0;
let draggingNode = null;

const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");

function save() {
  localStorage.setItem("mindmap", JSON.stringify({nodes, edges}));
}

function load() {
  const data = JSON.parse(localStorage.getItem("mindmap"));
  if (data) {
    nodes = data.nodes || [];
    edges = data.edges || [];
    nodes.forEach(createNodeElement);
    drawEdges();
  }
}

function addNode() {
  const node = { id: id++, x: 200, y: 200, text: "Idea", color: "#90cdf4", textColor: "#000", group: null };
  nodes.push(node);
  createNodeElement(node);
  save();
}

function createNodeElement(node) {
  const div = document.createElement("div");
  div.className = "node";
  div.style.left = node.x + "px";
  div.style.top = node.y + "px";
  div.style.background = node.color;
  div.dataset.id = node.id;

  const input = document.createElement("input");
  input.value = node.text;
  input.style.color = node.textColor;
  input.oninput = () => { node.text = input.value; save(); };

  const controls = document.createElement("div");
  controls.className = "controls";

  const color = document.createElement("input");
  color.type = "color";
  color.value = node.color;
  color.oninput = () => {
    node.color = color.value;
    div.style.background = node.color;
    save();
  };

  const textColor = document.createElement("input");
  textColor.type = "color";
  textColor.value = node.textColor;
  textColor.oninput = () => {
    node.textColor = textColor.value;
    input.style.color = node.textColor;
    save();
  };

  const del = document.createElement("button");
  del.textContent = "X";
  del.onclick = (e) => { e.stopPropagation(); deleteNode(node.id); };

  controls.appendChild(color);
  controls.appendChild(textColor);
  controls.appendChild(del);

  div.onclick = (e) => {
    e.stopPropagation();
    div.classList.toggle("active");
    toggleSelect(node.id, div);
  };

  div.onmousedown = (e) => {
    draggingNode = node;
    let offsetX = e.offsetX;
    let offsetY = e.offsetY;

    function move(e) {
      const moving = selectedNodes.includes(node.id) ? nodes.filter(n => selectedNodes.includes(n.id)) : [node];
      moving.forEach(n => {
        n.x += e.movementX;
        n.y += e.movementY;
        const el = document.querySelector(`[data-id='${n.id}']`);
        el.style.left = n.x + "px";
        el.style.top = n.y + "px";
      });
      drawEdges();
      drawPreviewLine(e);
    }

    function stop(e) {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", stop);
      tryConnect(e);
      clearPreview();
      save();
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  };

  div.appendChild(input);
  div.appendChild(controls);
  canvas.appendChild(div);
}

function toggleSelect(id, el) {
  if (selectedNodes.includes(id)) {
    selectedNodes = selectedNodes.filter(i => i !== id);
    el.classList.remove("selected");
  } else {
    selectedNodes.push(id);
    el.classList.add("selected");
  }
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  document.querySelector(`[data-id='${id}']`)?.remove();
  drawEdges();
  save();
}

function deleteSelected() {
  selectedNodes.forEach(deleteNode);
  selectedNodes = [];
}

function groupNodes() {
  const gid = Date.now();
  nodes.forEach(n => { if (selectedNodes.includes(n.id)) n.group = gid; });
}

function ungroupNodes() {
  nodes.forEach(n => { if (selectedNodes.includes(n.id)) n.group = null; });
}

function tryConnect(e) {
  const target = nodes.find(n => {
    return Math.abs(n.x - draggingNode.x) < 80 && Math.abs(n.y - draggingNode.y) < 80 && n.id !== draggingNode.id;
  });

  if (target) {
    edges.push({from: draggingNode.id, to: target.id, color: "black"});
    draggingNode.group = target.group || Date.now();
    target.group = draggingNode.group;
    drawEdges();
  }
}

let previewLine = null;
function drawPreviewLine(e) {
  clearPreview();
  if (!draggingNode) return;

  previewLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
  previewLine.setAttribute("x1", draggingNode.x + 50);
  previewLine.setAttribute("y1", draggingNode.y + 30);
  previewLine.setAttribute("x2", e.clientX);
  previewLine.setAttribute("y2", e.clientY);
  previewLine.setAttribute("stroke", "gray");
  previewLine.setAttribute("stroke-dasharray", "5,5");

  svg.appendChild(previewLine);
}

function clearPreview() {
  if (previewLine) previewLine.remove();
}

function drawEdges() {
  svg.innerHTML = "";
  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", from.x + 50);
    line.setAttribute("y1", from.y + 30);
    line.setAttribute("x2", to.x + 50);
    line.setAttribute("y2", to.y + 30);
    line.setAttribute("stroke", edge.color || "black");

    svg.appendChild(line);
  });
}

function downloadMap() {
  const name = document.getElementById("filename").value || "mindmap";
  const blob = new Blob([JSON.stringify({nodes, edges})], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".json";
  a.click();
}

function uploadMap(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const data = JSON.parse(reader.result);
    nodes = data.nodes || [];
    edges = data.edges || [];

    canvas.innerHTML = "";
    nodes.forEach(createNodeElement);
    drawEdges();
    save();
  };
  reader.readAsText(file);
}

canvas.onclick = () => {
  selectedNodes = [];
  document.querySelectorAll(".node").forEach(n => {
    n.classList.remove("selected");
    n.classList.remove("active");
  });
};

load();
</script>

</body>
</html>
