<!DOCTYPE html>
<html>
<head>
  <title>Mind Map App</title>
  <style>
    body { margin: 0; font-family: Arial; }
    #toolbar { padding: 10px; background: #eee; display: flex; gap: 10px; }
    #canvas { width: 100vw; height: 90vh; position: relative; background: #fafafa; overflow: hidden; }
    .node { position: absolute; padding: 10px; border-radius: 12px; cursor: move; min-width: 100px; border: 2px solid transparent; }
    .selected { border: 2px solid #000; }
    .controls { display: none; flex-direction: column; gap: 5px; margin-top: 5px; }
    .node.active .controls { display: flex; }
    #selectionBox { position: absolute; border: 1px dashed #333; background: rgba(0,0,0,0.05); display: none; }
    input { border: none; background: transparent; width: 100%; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode()">Add Node</button>
  <button onclick="addChildNode()">Add Child</button>
  <button onclick="deleteSelected()">Delete Selected</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="undo()">Undo</button>
  <button onclick="redo()">Redo</button>
  <button onclick="downloadMap()">Download</button>
  <input id="filename" placeholder="file name" />
  <input type="file" onchange="uploadMap(event)">
</div>

<div id="canvas"></div>
<div id="selectionBox"></div>
<svg id="lines" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>

<script>
let nodes = [];
let edges = [];
let selectedNodes = [];
let history = [];
let future = [];
let id = 0;
let draggingNode = null;
let draggingGroup = null;

const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");
const selectionBox = document.getElementById("selectionBox");

function saveState() {
  history.push(JSON.stringify({nodes, edges}));
  future = [];
  localStorage.setItem("mindmap", JSON.stringify({nodes, edges}));
}

function undo() {
  if (!history.length) return;
  future.push(JSON.stringify({nodes, edges}));
  const prev = JSON.parse(history.pop());
  nodes = prev.nodes;
  edges = prev.edges;
  reload();
}

function redo() {
  if (!future.length) return;
  history.push(JSON.stringify({nodes, edges}));
  const next = JSON.parse(future.pop());
  nodes = next.nodes;
  edges = next.edges;
  reload();
}

function reload() {
  canvas.innerHTML = "";
  nodes.forEach(createNodeElement);
  drawEdges();
}

function load() {
  const data = JSON.parse(localStorage.getItem("mindmap"));
  if (data) {
    nodes = data.nodes || [];
    edges = data.edges || [];
    reload();
  }
}

function addNode() {
  const node = { id: id++, x: 200, y: 200, text: "Idea", color: "#90cdf4", textColor: "#000" };
  nodes.push(node);
  createNodeElement(node);
  saveState();
}

function addChildNode() {
  if (selectedNodes.length !== 1) return;
  const parent = nodes.find(n => n.id === selectedNodes[0]);
  const node = { id: id++, x: parent.x + 120, y: parent.y + 80, text: "Child", color: "#a7f3d0", textColor: "#000" };
  nodes.push(node);
  edges.push({from: parent.id, to: node.id, color: "black", type: "child"});
  createNodeElement(node);
  drawEdges();
  saveState();
}

function createNodeElement(node) {
  const div = document.createElement("div");
  div.className = "node";
  div.style.left = node.x + "px";
  div.style.top = node.y + "px";
  div.style.background = node.color;
  div.dataset.id = node.id;

  const input = document.createElement("input");
  input.value = node.text;
  input.style.color = node.textColor;
  input.oninput = () => { node.text = input.value; saveState(); };

  const controls = document.createElement("div");
  controls.className = "controls";

  const color = document.createElement("input");
  color.type = "color";
  color.value = node.color;
  color.oninput = () => { node.color = color.value; div.style.background = node.color; saveState(); };

  const textColor = document.createElement("input");
  textColor.type = "color";
  textColor.value = node.textColor;
  textColor.oninput = () => { node.textColor = textColor.value; input.style.color = node.textColor; saveState(); };

  const delLine = document.createElement("button");
  delLine.textContent = "Del Lines";
  delLine.onclick = (e) => {
    e.stopPropagation();
    edges = edges.filter(ed => ed.from !== node.id);
    drawEdges();
    saveState();
  };

  controls.appendChild(color);
  controls.appendChild(textColor);
  controls.appendChild(delLine);

  div.onclick = (e) => {
    e.stopPropagation();
    div.classList.toggle("active");
    toggleSelect(node.id, div);
  };

  div.onmousedown = (e) => {
    draggingNode = node;

    function move(e) {
      node.x += e.movementX;
      node.y += e.movementY;
      div.style.left = node.x + "px";
      div.style.top = node.y + "px";
      drawEdges();
      previewLine(e);
    }

    function stop(e) {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", stop);
      connectOnDrop(e);
      clearPreview();
      saveState();
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  };

  div.appendChild(input);
  div.appendChild(controls);
  canvas.appendChild(div);
}

function getConnected(startId) {
  const visited = new Set();
  function dfs(id) {
    visited.add(id);
    edges.forEach(e => {
      if (e.from === id && !visited.has(e.to)) dfs(e.to);
      if (e.to === id && !visited.has(e.from)) dfs(e.from);
    });
  }
  dfs(startId);
  return nodes.filter(n => visited.has(n.id));
}

function toggleSelect(id, el) {
  if (selectedNodes.includes(id)) {
    selectedNodes = selectedNodes.filter(i => i !== id);
    el.classList.remove("selected");
  } else {
    selectedNodes.push(id);
    el.classList.add("selected");
  }
}

function connectOnDrop(e) {
  const target = nodes.find(n => Math.abs(n.x - draggingNode.x) < 80 && Math.abs(n.y - draggingNode.y) < 80 && n.id !== draggingNode.id);
  if (target) {
    edges.push({from: draggingNode.id, to: target.id, color: "black", type: "normal"});
    drawEdges();
  }
}

let preview = null;
function previewLine(e) {
  clearPreview();
  preview = document.createElementNS("http://www.w3.org/2000/svg", "line");
  preview.setAttribute("x1", draggingNode.x + 50);
  preview.setAttribute("y1", draggingNode.y + 30);
  preview.setAttribute("x2", e.clientX);
  preview.setAttribute("y2", e.clientY);
  preview.setAttribute("stroke", "gray");
  preview.setAttribute("stroke-dasharray", "5,5");
  svg.appendChild(preview);
}

function clearPreview() {
  if (preview) preview.remove();
}

function drawEdges() {
  svg.innerHTML = "";
  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const yOffsetFrom = edge.type === "child" ? 60 : 30;
    const yOffsetTo = edge.type === "child" ? 0 : 30;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", from.x + 50);
    line.setAttribute("y1", from.y + yOffsetFrom);
    line.setAttribute("x2", to.x + 50);
    line.setAttribute("y2", to.y + yOffsetTo);
    line.setAttribute("stroke", edge.color || "black");
    line.setAttribute("stroke-width", "3");
    line.style.cursor = "grab";
    line.style.pointerEvents = "stroke";

    // Drag line to move entire connected group
    line.onmousedown = (e) => {
      e.stopPropagation();
      draggingGroup = getConnected(edge.from);

      function move(e) {
        draggingGroup.forEach(n => {
          n.x += e.movementX;
          n.y += e.movementY;
          const el = document.querySelector(`[data-id='${n.id}']`);
          el.style.left = n.x + "px";
          el.style.top = n.y + "px";
        });
        drawEdges();
      }

      function stop() {
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", stop);
        saveState();
      }

      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", stop);
    };

    // Click to delete
    line.onclick = () => {
      edges = edges.filter(e => e !== edge);
      drawEdges();
      saveState();
    };

    svg.appendChild(line);
  });
}

function deleteSelected() {
  nodes = nodes.filter(n => !selectedNodes.includes(n.id));
  edges = edges.filter(e => !selectedNodes.includes(e.from) && !selectedNodes.includes(e.to));
  selectedNodes = [];
  reload();
  saveState();
}

function clearAll() {
  nodes = [];
  edges = [];
  selectedNodes = [];
  reload();
  saveState();
}

function downloadMap() {
  const name = document.getElementById("filename").value || "mindmap";
  const blob = new Blob([JSON.stringify({nodes, edges})], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".json";
  a.click();
}

function uploadMap(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const data = JSON.parse(reader.result);
    nodes = data.nodes || [];
    edges = data.edges || [];
    reload();
    saveState();
  };
  reader.readAsText(file);
}

// Selection box
let startX, startY;
canvas.addEventListener("mousedown", (e) => {
  if (e.target !== canvas) return;

  startX = e.clientX;
  startY = e.clientY;

  selectionBox.style.left = startX + "px";
  selectionBox.style.top = startY + "px";
  selectionBox.style.width = 0;
  selectionBox.style.height = 0;
  selectionBox.style.display = "block";

  function move(e) {
    const w = e.clientX - startX;
    const h = e.clientY - startY;

    selectionBox.style.width = Math.abs(w) + "px";
    selectionBox.style.height = Math.abs(h) + "px";
    selectionBox.style.left = (w < 0 ? e.clientX : startX) + "px";
    selectionBox.style.top = (h < 0 ? e.clientY : startY) + "px";

    selectedNodes = [];
    document.querySelectorAll(".node").forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.left > selectionBox.offsetLeft && rect.top > selectionBox.offsetTop && rect.right < selectionBox.offsetLeft + selectionBox.offsetWidth && rect.bottom < selectionBox.offsetTop + selectionBox.offsetHeight) {
        el.classList.add("selected");
        selectedNodes.push(Number(el.dataset.id));
      } else {
        el.classList.remove("selected");
      }
    });
  }

  function stop() {
    selectionBox.style.display = "none";
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  }

  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", stop);
});

load();
</script>

</body>
</html>
